import ctypes
import random
import time
import threading
import tkinter as tk
from tkinter import messagebox, scrolledtext
import subprocess

# ==================== Windows API ====================
user32 = ctypes.windll.user32

def get_mouse_pos():
    class POINT(ctypes.Structure):
        _fields_ = [("x", ctypes.c_long), ("y", ctypes.c_long)]
    pt = POINT()
    user32.GetCursorPos(ctypes.byref(pt))
    return (pt.x, pt.y)

def is_left_mouse_down():
    return user32.GetAsyncKeyState(0x01) & 0x8000 != 0

def ps_mouse_move_click(x, y):
    script = f'''
Add-Type -AssemblyName System.Windows.Forms
[System.Windows.Forms.Cursor]::Position = [System.Drawing.Point]::new({x},{y})
Start-Sleep -Milliseconds 80
Add-Type -MemberDefinition '[DllImport("user32.dll")] public static void mouse_event(int f, int dx, int dy, int btn, int info);' -Name User32 -Namespace Win
[Win.User32]::mouse_event(2,0,0,0,0)
Start-Sleep -Milliseconds 60
[Win.User32]::mouse_event(4,0,0,0,0)
'''
    subprocess.run(["powershell", "-Command", script], creationflags=subprocess.CREATE_NO_WINDOW, capture_output=True)

def ps_press_key(key):
    if key == " ":
        user32.keybd_event(0x20, 0, 0, 0)
        time.sleep(0.05)
        user32.keybd_event(0x20, 0, 2, 0)
    else:
        cmd = f'Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.SendKeys]::SendWait("{key}")'
        subprocess.run(["powershell", "-Command", cmd], creationflags=subprocess.CREATE_NO_WINDOW, capture_output=True)

# ==================== 全局变量 ====================
global_running = True
saved_points = []
saved_points_4 = []
采集锁 = threading.Lock()

# ==================== 按键映射 ====================
KEY_MAP1 = {1: "a", 2: "w", 3: "s", 4: "d", 5: " "}
NUM_POOL1 = [1, 2, 3, 4, 5]
KEY_MAP2 = {1: "mouse", 2: " ", 3: "f"}
NUM_POOL2 = [1, 2, 3]
KEY_MAP3 = {1: "mouse", 2: " ", 3: "f"}
NUM_POOL3 = [1, 2, 3]

def get_rand_delay():
    return round(random.uniform(0.3, 2.0), 2)

# ==================== 5秒限制检查 ====================
class NumLimitChecker:
    def __init__(self):
        self.record = []
        self.连续1计数 = 0
    def check(self, target_num):
        now = time.time()
        self.record = [(n, t) for n, t in self.record if now - t < 5]
        cnt = sum(1 for n, t in self.record if n == target_num)
        if cnt >= 5:
            return False
        if target_num == 1:
            self.连续1计数 += 1
            if self.连续1计数 >= 2:
                return False
        else:
            self.连续1计数 = 0
        self.record.append((target_num, now))
        return True

# ==================== 快捷键监听 ====================
def hotkey_monitor(log_callback):
    global global_running
    while True:
        if (user32.GetAsyncKeyState(0x11) & 0x8000 and
            user32.GetAsyncKeyState(0x53) & 0x8000 and
            user32.GetAsyncKeyState(0x54) & 0x8000):
            global_running = False
            log_callback("\n==== 检测到 Ctrl+S+T，全部任务停止 ====")
            break
        time.sleep(0.05)

# ==================== 程序一（修复：循环内频繁检查 global_running） ====================
def task_program1(log_callback):
    global global_running
    checker = NumLimitChecker()
    last_num = None
    log_callback("【程序一】等待3秒启动...")
    time.sleep(3)
    log_callback("========== 乱跑乱跳 运行中 ==========")
    while global_running:
        # 生成随机数前检查
        if not global_running:
            break
        while True:
            if not global_running:
                break
            num = random.choice(NUM_POOL1)
            if num != last_num and checker.check(num):
                break
        if not global_running:
            break
        last_num = num
        delay = get_rand_delay()
        key = KEY_MAP1[num]
        log_callback(f"间隔{delay}s | 随机数:{num} | 按下:{key}")
        ps_press_key(key)
        # 等待过程中用循环睡眠，每0.1秒检查一次 global_running
        slept = 0
        while slept < delay and global_running:
            time.sleep(0.1)
            slept += 0.1

# ==================== 程序二 ====================
def task_program2(log_callback):
    global global_running, saved_points
    if len(saved_points) < 20:
        log_callback("【程序二报错】坐标不足20个，请先采集20个屏幕坐标！")
        return
    checker = NumLimitChecker()
    last_num = None
    log_callback("【程序二】等待3秒启动...")
    time.sleep(3)
    log_callback("========== 跳过程序 运行中 ==========")
    while global_running:
        while True:
            if not global_running:
                break
            num = random.choice(NUM_POOL2)
            if num != last_num and checker.check(num):
                break
        if not global_running:
            break
        last_num = num
        delay = get_rand_delay()
        act = KEY_MAP2[num]
        log_callback(f"间隔{delay}s | 随机数:{num} | 动作:{act}")
        if not global_running:
            break
        if act in (" ", "f"):
            ps_press_key(act)
        elif act == "mouse":
            eight_points = random.sample(saved_points, 8)
            random.shuffle(eight_points)
            for px, py in eight_points:
                if not global_running:
                    break
                ps_mouse_move_click(px, py)
                time.sleep(0.1)
        if not global_running:
            break
        slept = 0
        while slept < delay and global_running:
            time.sleep(0.1)
            slept += 0.1

# ==================== 坐标采集20个 ====================
def collect_20_points(log_callback, root):
    global saved_points, global_running
    with 采集锁:
        saved_points.clear()
    log_callback("\n========== 坐标采集开始 ==========")
    log_callback("请在每个目标位置【单击鼠标左键】，程序自动记录坐标")
    count = 0
    last_click_time = 0
    while count < 20 and global_running:
        if is_left_mouse_down():
            now = time.time()
            if now - last_click_time > 0.3:
                x, y = get_mouse_pos()
                with 采集锁:
                    saved_points.append((x, y))
                count += 1
                last_click_time = now
                log_callback(f"已采集 {count}/20 坐标 ({x}, {y})")
                while is_left_mouse_down() and global_running:
                    time.sleep(0.01)
        time.sleep(0.01)
    if count >= 20:
        log_callback("\n########## 20个坐标全部采集完成 ##########")
        root.after(0, lambda: messagebox.showinfo("采集完成", f"已成功采集 {len(saved_points)} 个坐标点！"))
    else:
        root.after(0, lambda: messagebox.showwarning("采集中断", "采集未完成"))

# ==================== 坐标采集4个 ====================
def collect_4_points(log_callback, root):
    global saved_points_4, global_running
    with 采集锁:
        saved_points_4.clear()
    log_callback("\n========== 程序三坐标采集开始 ==========")
    log_callback("请点击屏幕4次，记录4个像素坐标")
    count = 0
    last_click_time = 0
    while count < 4 and global_running:
        if is_left_mouse_down():
            now = time.time()
            if now - last_click_time > 0.3:
                x, y = get_mouse_pos()
                with 采集锁:
                    saved_points_4.append((x, y))
                count += 1
                last_click_time = now
                log_callback(f"已采集 {count}/4 坐标 ({x}, {y})")
                while is_left_mouse_down() and global_running:
                    time.sleep(0.01)
        time.sleep(0.01)
    if count >= 4:
        log_callback("\n########## 4个坐标全部采集完成 ##########")
        root.after(0, lambda: messagebox.showinfo("采集完成", f"已成功采集 {len(saved_points_4)} 个坐标点！"))
    else:
        root.after(0, lambda: messagebox.showwarning("采集中断", "采集未完成"))

# ==================== 程序三（修复：随机生成小于4个点） ====================
def task_program3(log_callback):
    global global_running, saved_points_4
    if len(saved_points_4) < 4:
        log_callback("【程序三报错】坐标不足4个，请先采集4个屏幕坐标！")
        return
    
    xs = [p[0] for p in saved_points_4]
    ys = [p[1] for p in saved_points_4]
    x_min, x_max = min(xs), max(xs)
    y_min, y_max = min(ys), max(ys)
    
    checker = NumLimitChecker()
    last_num = None
    log_callback("【程序三】等待3秒启动...")
    time.sleep(3)
    log_callback("========== 跳过2 运行中 ==========")
    log_callback(f"坐标范围: X[{x_min}, {x_max}], Y[{y_min}, {y_max}]")
    
    while global_running:
        while True:
            if not global_running:
                break
            num = random.choice(NUM_POOL3)
            if num == 1 and last_num == 1:
                continue
            if num != last_num and checker.check(num):
                break
        if not global_running:
            break
        last_num = num
        delay = get_rand_delay()
        act = KEY_MAP3[num]
        log_callback(f"间隔{delay}s | 随机数:{num} | 动作:{act}")
        
        if not global_running:
            break
        
        if act in (" ", "f"):
            ps_press_key(act)
        elif act == "mouse":
            # 随机生成小于4个点（1-3个）
            point_count = random.randint(1, 3)
            log_callback(f"  随机生成 {point_count} 个坐标点")
            points = []
            for _ in range(point_count):
                px = random.randint(x_min, x_max)
                py = random.randint(y_min, y_max)
                points.append((px, py))
            for px, py in points:
                if not global_running:
                    break
                log_callback(f"  移动到 ({px}, {py}) 并单击")
                ps_mouse_move_click(px, py)
                time.sleep(0.1)
        
        if not global_running:
            break
        slept = 0
        while slept < delay and global_running:
            time.sleep(0.1)
            slept += 0.1

# ==================== 主窗口 ====================
class MainGUI:
    def __init__(self, root_win):
        self.root = root_win
        self.root.title("键鼠自动化工具")
        self.root.geometry("740x620")
        self.root.resizable(False, False)

        tk.Label(self.root, text="全局终止快捷键：Ctrl + S + T | 纯Tkinter + PowerShell", font=("微软雅黑", 10)).pack(pady=4)

        btn_frame = tk.Frame(self.root)
        btn_frame.pack(pady=8)

        self.btn_run1 = tk.Button(btn_frame, text="启动程序一【乱跑乱跳】", width=18, height=2, command=self.run1)
        self.btn_run1.grid(row=0, column=0, padx=5)

        self.btn_collect = tk.Button(btn_frame, text="采集20个屏幕坐标", width=18, height=2, command=self.start_collect)
        self.btn_collect.grid(row=0, column=1, padx=5)

        self.btn_run2 = tk.Button(btn_frame, text="启动程序二【跳过】", width=18, height=2, command=self.run2)
        self.btn_run2.grid(row=0, column=2, padx=5)

        self.btn_collect4 = tk.Button(btn_frame, text="采集4个屏幕坐标(程序三用)", width=20, height=2, command=self.start_collect4)
        self.btn_collect4.grid(row=1, column=0, padx=5, pady=5)

        self.btn_run3 = tk.Button(btn_frame, text="启动程序三【跳过2】", width=18, height=2, command=self.run3)
        self.btn_run3.grid(row=1, column=1, padx=5, pady=5)

        self.btn_stop = tk.Button(self.root, text="一键停止全部自动化任务", width=26, height=2, bg="#ff5555", command=self.stop_all)
        self.btn_stop.pack(pady=5)

        self.log_text = scrolledtext.ScrolledText(self.root, width=92, height=19, font=("Consolas", 9))
        self.log_text.pack(padx=10, pady=5)

        threading.Thread(target=hotkey_monitor, args=(self.append_log,), daemon=True).start()

    def append_log(self, text):
        self.log_text.insert(tk.END, text + "\n")
        self.log_text.see(tk.END)

    def stop_all(self):
        global global_running
        global_running = False
        self.append_log("==== 停止指令已下发，所有任务终止 ====")

    def run1(self):
        global global_running
        global_running = True
        threading.Thread(target=task_program1, args=(self.append_log,), daemon=True).start()
        self.append_log("已触发：启动乱跑乱跳程序")

    def start_collect(self):
        threading.Thread(target=collect_20_points, args=(self.append_log, self.root), daemon=True).start()
        self.append_log("已触发：坐标采集程序（请在目标位置单击鼠标左键）")

    def run2(self):
        global global_running
        global_running = True
        threading.Thread(target=task_program2, args=(self.append_log,), daemon=True).start()
        self.append_log("已触发：启动跳过程序")

    def start_collect4(self):
        threading.Thread(target=collect_4_points, args=(self.append_log, self.root), daemon=True).start()
        self.append_log("已触发：采集4个坐标（请在目标位置单击鼠标左键4次）")

    def run3(self):
        global global_running
        global_running = True
        threading.Thread(target=task_program3, args=(self.append_log,), daemon=True).start()
        self.append_log("已触发：启动跳过2程序")

if __name__ == "__main__":
    window = tk.Tk()
    app = MainGUI(window)
    window.mainloop()
